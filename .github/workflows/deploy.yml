name: Django Auto Deploy to Synology

on:
  push:
    branches: [ main ] # main 브랜치에 push될 때 실행

jobs:
  deploy:
    runs-on: self-hosted # 시놀로지에 떠 있는 runner를 사용합니다.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Synology
        run: |
          # 1) 소스 코드를 시놀로지 배포 경로로 동기화
          # venv/media는 보존하고 코드만 최신화합니다.
          rsync -a --delete \
            --exclude='.git' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='media' \
            ./ /volume1/web/sc_garden/
          
          # 2) 배포 필수 파일 검증
          test -f /volume1/web/sc_garden/manage.py
          test -f /volume1/web/sc_garden/config/settings.py

          # 3) 가상환경 진입 및 의존성 설치
          cd /volume1/web/sc_garden/
          if [ ! -d venv ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate
          pip install -r requirements.txt
          
          # 4) 데이터베이스 마이그레이션 및 정적 파일 수집
          python manage.py migrate
          python manage.py collectstatic --noinput
          
          # 5) 개발 서버 재기동
          pkill -f "manage.py run_auto_server" || true
          nohup python manage.py run_auto_server > /tmp/sc_garden.log 2>&1 &
          sleep 3
          (ss -lntp | grep -E ':8080|:8000') || true